<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Central • Sangue Carmesim</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div class="background-glow"></div>

  <main class="container">

    <!-- HERO -->
    <section class="hero">

      <div class="hero-badge">
        🩸 Central Oficial
      </div>

      <h1>
        Sangue <span>Carmesim</span>
      </h1>

      <p>
        Todos os caminhos levam ao carmesim.
      </p>

    </section>

    <!-- LINKS -->
    <section class="cards-grid">

      <!-- RELATÓRIOS -->
      <a
        href="https://felypedantas.github.io/relatorios-de-comite/"
        target="_blank"
        class="card"
      >
        <div class="card-icon">📑</div>

        <div class="card-content">
          <h2>Relatórios de Comitê</h2>

          <p>
            Sistema de relatórios mensais dos comitês.
          </p>
        </div>

        <span class="card-arrow">↗</span>
      </a>

      <!-- FICHAS -->
      <a
        href="https://felypedantas.github.io/ficha-tecnica-dark-roses/"
        target="_blank"
        class="card"
      >
        <div class="card-icon">🧾</div>

        <div class="card-content">
          <h2>Ficha Técnica</h2>

          <p>
            Criação de fichas para novos membros.
          </p>
        </div>

        <span class="card-arrow">↗</span>
      </a>

      <!-- EM BREVE -->
      <div class="card disabled">

        <div class="card-icon">🕯️</div>

        <div class="card-content">
          <h2>Novos Sistemas</h2>

          <p>
            Novas áreas da central serão abertas em breve.
          </p>
        </div>

      </div>

    </section>

    <!-- FOOTER -->
    <footer class="footer">
      <p>
        © 2026 • Sangue Carmesim
      </p>
    </footer>

  </main>

</body>
</html>
